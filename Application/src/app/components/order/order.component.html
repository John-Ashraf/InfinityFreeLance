<section class="py-3 py-md-5 py-xl-8">
    <div class="container">
        <div class="row justify-content-md-center">
            <div class="col-12 col-md-10 col-lg-8 col-xl-7 col-xxl-6">
                <h2 class="mb-4 display-5 text-center">Order Product</h2>
                <p class="text-secondary mb-5 text-center lead fs-4">Our team is available to provide prompt and helpful
                    responses to all inquiries. You can reach us via phone, email, or by filling out the contact form
                    below.</p>
                <hr class="w-50 mx-auto mb-5 mb-xl-9 border-dark-subtle">
            </div>
        </div>
    </div>

    <div class="col-12 col-lg-6 bg-light my-auto mx-auto mt-3 mb-3 border rounded">
        <div class="row align-items-lg-center h-100">
            <div class="col-12">
                <form action="#!" #sendOrder="ngForm" (ngSubmit)="order(sendOrder)">
                    <div class="row gy-4 gy-xl-5 p-4 p-xl-5">
                        <div class="col-12">
                            <!-- <label for="fullname" class="form-label">Full Name <span
                                    class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="fullname"
                                name="fullname" value="" required> -->
                            <label for="ProductName" class="form-label">Product Name <span
                                    class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="ProductName" name="ProductName" value=""
                            [(ngModel)]="orderData.ProductName"  required>
                        </div>
                        <div class="col-12 col-md-6">
                            <label for="Quantity" class="form-label">Quantity <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <svg fill="#000000" version="1.1" id="Capa_1" xmlns="http://www.w3.org/2000/svg"
                                        width="16" height="16" xmlns:xlink="http://www.w3.org/1999/xlink"
                                        viewBox="0 0 188.554 188.555" xml:space="preserve">
                                        <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
                                        <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round">
                                        </g>
                                        <g id="SVGRepo_iconCarrier">
                                            <g>
                                                <path

                                                </path>
                                            </g>
                                        </g>
                                    </svg>
                                </span>
                                <input type="number" class="form-control" id="Quantity" name="Quantity" value=""
                                [(ngModel)]="orderData.Quantity" (change)="onQuantityChange()"  required>
                            </div>
                        </div>
                        <div class="col-12 col-md-6">
                            <label for="phone" class="form-label">Phone Number <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <svg fill="#000000" width="16px" height="16px" viewBox="0 0 32 32" version="1.1"
                                        xmlns="http://www.w3.org/2000/svg">
                                        <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
                                        <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round">
                                        </g>
                                        <g id="SVGRepo_iconCarrier">
                                            <title>phone</title>
                                            <path
                                                d="M0 10.375c0 0.938 0.344 1.969 0.781 3.063s1 2.125 1.438 2.906c1.188 2.063 2.719 4.094 4.469 5.781s3.813 3.094 6.125 3.938c1.344 0.531 2.688 1.125 4.188 1.125 0.75 0 1.813-0.281 2.781-0.688 0.938-0.406 1.781-1.031 2.094-1.781 0.125-0.281 0.281-0.656 0.375-1.094 0.094-0.406 0.156-0.813 0.156-1.094 0-0.156 0-0.313-0.031-0.344-0.094-0.188-0.313-0.344-0.563-0.5-0.563-0.281-0.656-0.375-1.5-0.875-0.875-0.5-1.781-1.063-2.563-1.469-0.375-0.219-0.625-0.313-0.719-0.313-0.5 0-1.125 0.688-1.656 1.438-0.563 0.75-1.188 1.438-1.625 1.438-0.219 0-0.438-0.094-0.688-0.25s-0.5-0.281-0.656-0.375c-2.75-1.563-4.594-3.406-6.156-6.125-0.188-0.313-0.625-0.969-0.625-1.313 0-0.406 0.563-0.875 1.125-1.375 0.531-0.469 1.094-1.031 1.094-1.719 0-0.094-0.063-0.375-0.188-0.781-0.281-0.813-0.656-1.75-0.969-2.656-0.156-0.438-0.281-0.75-0.313-0.906-0.063-0.094-0.094-0.219-0.125-0.375s-0.094-0.281-0.125-0.406c-0.094-0.281-0.25-0.5-0.406-0.625-0.156-0.063-0.531-0.156-0.906-0.188-0.375 0-0.813-0.031-1-0.031-0.094 0-0.219 0-0.344 0.031h-0.406c-1 0.438-1.719 1.313-2.25 2.344-0.5 1.031-0.813 2.188-0.813 3.219z">
                                            </path>
                                        </g>
                                    </svg>
                                </span>
                                <input type="text" class="form-control" id="phone" name="phone" value=""  [(ngModel)]="orderData.PhoneNumber" required>
                            </div>
                        </div>
                        <div class="col-12">
                            <!-- <label for="subject" class="form-label">Subject <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="subject" name="subject" value="" required> -->
                            <label for="Category" class="form-label">Size</label>
                            <select class="form-select" id="size" name="size" [(ngModel)]="orderData.Size" required>
                                <option value="" disabled selected>Select Size </option>
                                <option>small</option>
                                <option>medium</option>
                                <option>large</option>
                                <option>XL</option>
                                <option>XXL</option>
                                <option>XXXL</option>
                            </select>
                        </div>
                        <!-- Logo Upload -->
                       
                <!-- Upload  Images -->
                <div class="mb-4">
                    <label class="form-label">Upload Product Images</label>
                    <div class="upload-area border rounded p-3 text-center position-relative"
                        (dragover)="onDragOver($event)" (drop)="onDrop($event)">

                        <input type="file" id="fileUpload" multiple accept="image/*" class="d-none"
                            (change)="onFileSelected($event)">

                        <div *ngIf="previewUrls.length === 0" class="py-5">
                            <i class="bi bi-cloud-arrow-up fs-2"></i>
                            <p class="mt-2 mb-0">Choose files or drop here</p>
                        </div>

                        <label for="fileUpload" class="btn btn-primary mt-2" *ngIf="previewUrls.length === 0">
                            Choose files
                        </label>

                        <div *ngIf="previewUrls.length > 0" class="row mt-3">
                            <div class="col-md-3 mb-3" *ngFor="let url of previewUrls; let i = index">
                                <div class="position-relative">
                                    <img [src]="url" class="img-thumbnail" alt="Uploaded image">
                                    <button type="button" class="btn btn-sm btn-danger position-absolute top-0 end-0"
                                        (click)="removeImage(i)">
                                        <i class="bi bi-x"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="col-12 mt-2">
                                <label for="fileUpload" class="btn btn-outline-primary">
                                    Add more files
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
                        <div class="col-12">
                            <label for="Address" class="form-label">Address<span class="text-danger">*</span></label>
                            <textarea class="form-control" id="Address" name="Address" [(ngModel)]="orderData.Address" rows="3" required></textarea>
                        </div>
                        <div class="col-12">
                            <label for="message" class="form-label">Message <span class="text-danger">*</span></label>
                            <textarea class="form-control" id="message" name="message" [(ngModel)]="orderData.Message" rows="3" required></textarea>
                        </div>
                        <div class="col-12">
                            <div class="d-grid">
                                <button class="btn btn-lg mb-3 me-2" type="submit">
                                    <i class="bi bi-cart-plus"></i> Order Now 
                                </button>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>
