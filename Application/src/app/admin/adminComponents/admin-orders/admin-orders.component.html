<div class="card">
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>Date</th>
                        <!-- <th>ProductName</th> -->
                        <th>Quantity</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    @for (order of orders; track $index) {
                    <tr>
                        <td>{{order.date | date:"medium" }}</td>
                        <!-- <td></td> -->
                        <td>{{order.quantity}}</td>
                        <td>
                            <div class="btn-group">
                                <button class="btn btn-danger btn-sm" (click)="deleteOrder(order.id)" >Delete</button>
                                <button class="btn btn-primary btn-sm ms-2" >View</button>
                            </div>
                        </td>
                    </tr>
                    }
                </tbody>
            </table>
        </div>
    </div>
</div>
